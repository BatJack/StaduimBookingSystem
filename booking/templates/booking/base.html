<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}羽毛球场地预约系统{% endblock %}</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --primary-light: #EEF2FF;
            --secondary: #64748B;
            --success: #10B981;
            --success-hover: #059669;
            --success-light: #D1FAE5;
            --danger: #EF4444;
            --danger-hover: #DC2626;
            --danger-light: #FEE2E2;
            --warning: #F59E0B;
            --warning-light: #FEF3C7;
            --info: #3B82F6;
            --info-light: #DBEAFE;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-400: #9CA3AF;
            --gray-500: #6B7280;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --gray-900: #111827;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
            --radius-sm: 4px;
            --radius: 8px;
            --radius-lg: 12px;
            --transition: all 0.2s ease;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', Roboto, sans-serif;
            background-color: var(--gray-100);
            color: var(--gray-800);
            line-height: 1.6;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, #6366F1 100%);
            color: white;
            padding: 0;
            box-shadow: var(--shadow-md);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 64px;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.025em;
        }
        .nav {
            display: flex;
            gap: 4px;
        }
        .nav a {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
        }
        .nav a:hover {
            background-color: rgba(255, 255, 255, 0.15);
            color: white;
        }
        .nav a.active {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px;
        }
        .messages {
            margin-bottom: 24px;
        }
        .messages .message {
            padding: 14px 18px;
            margin-bottom: 12px;
            border-radius: var(--radius);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .messages .error {
            background-color: var(--danger-light);
            color: #991B1B;
            border-left: 4px solid var(--danger);
        }
        .messages .success {
            background-color: var(--success-light);
            color: #065F46;
            border-left: 4px solid var(--success);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 18px;
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
            white-space: nowrap;
        }
        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        .btn:active {
            transform: translateY(0);
        }
        .btn-danger {
            background-color: var(--danger);
        }
        .btn-danger:hover {
            background-color: var(--danger-hover);
        }
        .btn-success {
            background-color: var(--success);
        }
        .btn-success:hover {
            background-color: var(--success-hover);
        }
        .btn-outline {
            background-color: transparent;
            color: var(--gray-700);
            border: 1px solid var(--gray-300);
        }
        .btn-outline:hover {
            background-color: var(--gray-50);
            border-color: var(--gray-400);
            box-shadow: var(--shadow-sm);
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
        }
        .btn-icon {
            padding: 8px;
            width: 36px;
            height: 36px;
        }
        .card {
            background-color: white;
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            border: 1px solid var(--gray-200);
        }
        .card h2 {
            margin-bottom: 20px;
            color: var(--gray-900);
            font-size: 20px;
            font-weight: 600;
        }
        .card h3 {
            color: var(--gray-800);
            font-size: 16px;
            font-weight: 600;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        table th, table td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--gray-200);
        }
        table th {
            background-color: var(--gray-50);
            font-weight: 600;
            color: var(--gray-600);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        table tbody tr {
            transition: var(--transition);
        }
        table tbody tr:hover {
            background-color: var(--gray-50);
        }
        table tbody td {
            color: var(--gray-700);
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--gray-700);
            font-size: 14px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--gray-300);
            border-radius: var(--radius);
            font-size: 14px;
            transition: var(--transition);
            background-color: white;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }
        .form-group small {
            display: block;
            margin-top: 6px;
            color: var(--gray-500);
            font-size: 12px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 24px;
        }
        .page-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .page-header h2 {
            font-size: 28px;
            color: var(--gray-900);
            margin-bottom: 8px;
            font-weight: 600;
        }
        .page-header p {
            color: var(--gray-500);
            font-size: 14px;
        }
        .court-card {
            background: white;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            border: 1px solid var(--gray-200);
        }
        .court-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }
        .court-card-header {
            background: linear-gradient(135deg, var(--primary) 0%, #6366F1 100%);
            color: white;
            padding: 24px;
            text-align: center;
        }
        .court-card-header h3 {
            font-size: 18px;
            margin: 0;
            font-weight: 600;
        }
        .court-card-body {
            padding: 20px;
        }
        .court-card-body p {
            color: var(--gray-500);
            font-size: 14px;
            line-height: 1.6;
            min-height: 60px;
        }
        .court-card-footer {
            padding: 16px 20px;
            background: var(--gray-50);
            border-top: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .court-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-available {
            background: var(--success-light);
            color: #065F46;
        }
        .status-unavailable {
            background: var(--danger-light);
            color: #991B1B;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-available .status-dot {
            background: var(--success);
        }
        .status-unavailable .status-dot {
            background: var(--danger);
        }
        .btn-book {
            padding: 10px 24px;
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 500;
            transition: var(--transition);
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-book:hover {
            transform: scale(1.05);
            box-shadow: var(--shadow-md);
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray-500);
        }
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        .empty-state h3 {
            font-size: 18px;
            color: var(--gray-700);
            margin-bottom: 8px;
            font-weight: 500;
        }
        .date-selector {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .date-selector label {
            font-weight: 500;
            color: var(--gray-700);
        }
        .date-selector input {
            padding: 10px 14px;
            border: 1px solid var(--gray-300);
            border-radius: var(--radius);
            font-size: 14px;
            transition: var(--transition);
        }
        .date-selector input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }
        .time-grid-container {
            background: white;
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            border: 1px solid var(--gray-200);
        }
        .time-grid-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--gray-200);
        }
        .time-grid-header h4 {
            color: var(--gray-800);
            font-size: 16px;
            font-weight: 600;
        }
        .time-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .time-slot {
            min-width: 80px;
            padding: 12px 10px;
            text-align: center;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
        }
        .time-slot.available {
            background: var(--success-light);
            color: #065F46;
            border-color: #6EE7B7;
        }
        .time-slot.available:hover {
            background: #A7F3D0;
            border-color: #34D399;
        }
        .time-slot.booked {
            background: var(--danger-light);
            color: #991B1B;
            border-color: #FCA5A5;
            cursor: not-allowed;
        }
        .time-slot.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary-hover);
        }
        .time-slot.selected:hover {
            background: var(--primary-hover);
        }
        .booking-summary {
            background: linear-gradient(135deg, var(--info-light) 0%, #BFDBFE 100%);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-top: 20px;
            display: none;
        }
        .booking-summary.show {
            display: block;
        }
        .booking-summary h4 {
            color: #1E40AF;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .booking-summary p {
            color: #1E3A8A;
            margin-bottom: 16px;
        }
        .booking-actions {
            display: flex;
            gap: 12px;
        }
        .btn-confirm {
            padding: 12px 28px;
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-confirm:hover {
            transform: scale(1.02);
            box-shadow: var(--shadow-md);
        }
        .btn-cancel {
            padding: 12px 28px;
            background: var(--gray-100);
            color: var(--gray-600);
            border: 1px solid var(--gray-300);
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-cancel:hover {
            background: var(--gray-200);
        }
        .legend {
            display: flex;
            gap: 24px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--gray-200);
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--gray-500);
        }
        .legend-dot {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }
        .legend-dot.available {
            background: var(--success-light);
            border: 2px solid #6EE7B7;
        }
        .legend-dot.booked {
            background: var(--danger-light);
            border: 2px solid #FCA5A5;
        }
        .legend-dot.selected {
            background: var(--primary);
            border: 2px solid var(--primary-hover);
        }
        .no-availability {
            text-align: center;
            padding: 40px;
            color: var(--gray-400);
        }
        .no-availability p {
            margin-top: 12px;
            font-size: 14px;
        }
        .court-section {
            margin-bottom: 32px;
        }
        .court-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .court-title h3 {
            color: var(--gray-800);
            font-size: 18px;
            font-weight: 600;
        }
        .action-btns {
            display: flex;
            gap: 8px;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-primary {
            background: var(--primary-light);
            color: var(--primary);
        }
        .badge-success {
            background: var(--success-light);
            color: #065F46;
        }
        .badge-warning {
            background: var(--warning-light);
            color: #92400E;
        }
        .badge-danger {
            background: var(--danger-light);
            color: #991B1B;
        }
        .table-wrapper {
            overflow-x: auto;
            border-radius: var(--radius);
            border: 1px solid var(--gray-200);
        }
        .stat-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 24px;
            border: 1px solid var(--gray-200);
            box-shadow: var(--shadow);
            transition: var(--transition);
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .stat-card-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 16px;
        }
        .stat-card-icon.blue {
            background: var(--info-light);
            color: var(--info);
        }
        .stat-card-icon.green {
            background: var(--success-light);
            color: var(--success);
        }
        .stat-card-icon.orange {
            background: var(--warning-light);
            color: var(--warning);
        }
        .stat-card-icon.red {
            background: var(--danger-light);
            color: var(--danger);
        }
        .stat-card-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 4px;
        }
        .stat-card-label {
            font-size: 14px;
            color: var(--gray-500);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <h1>羽毛球场地预约系统</h1>
            <div class="nav">
                {% if user.is_authenticated %}
                    <a href="{% url 'court_list' %}">场地列表</a>
                    <a href="{% url 'my_bookings' %}">我的预约</a>
                    {% if user.profile.user_type == 'admin' %}
                        <a href="{% url 'admin_dashboard' %}">管理后台</a>
                    {% endif %}
                    <a href="{% url 'logout' %}">退出登录</a>
                {% else %}
                    <a href="{% url 'login' %}">登录</a>
                {% endif %}
            </div>
        </div>
    </div>

    <div class="container">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
