{% extends 'booking/base.html' %}

{% block title %}设置可用时间段 - 羽毛球场地预约系统{% endblock %}

{% block content %}
    <div class="page-title">设置可用时间段</div>

    <div class="card" style="max-width: 600px; margin: 0 auto;">
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="court">选择场地</label>
                <select id="court" name="court" required>
                    <option value="">请选择场地</option>
                    {% for court in courts %}
                        <option value="{{ court.id }}">{{ court.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="start_date">开始日期</label>
                <input type="date" id="start_date" name="start_date" required>
            </div>
            <div class="form-group">
                <label for="end_date">结束日期</label>
                <input type="date" id="end_date" name="end_date" required>
                <small>设置场地可预约的日期范围</small>
            </div>
            <div class="form-group">
                <label for="start_time">每天开始时间</label>
                <input type="time" id="start_time" name="start_time" step="1800" required>
                <small>时间必须是整点或半点</small>
            </div>
            <div class="form-group">
                <label for="end_time">每天结束时间</label>
                <input type="time" id="end_time" name="end_time" step="1800" required>
                <small>时间必须是整点或半点</small>
            </div>
            <div style="display: flex; gap: 12px; margin-top: 24px;">
                <button type="submit" class="btn btn-success">设置</button>
                <a href="{% url 'admin_availability_list' %}" class="btn btn-outline">取消</a>
            </div>
        </form>
    </div>
{% endblock %}
