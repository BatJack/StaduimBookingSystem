{% extends 'booking/base.html' %}

{% block title %}添加预约 - 体育场馆预约系统{% endblock %}

{% block content %}
<style>
    .page-header {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 24px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--gray-200);
    }
    .back-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        border-radius: var(--radius);
        background-color: var(--gray-800);
        color: white;
        text-decoration: none;
        transition: var(--transition);
        flex-shrink: 0;
    }
    .back-btn:hover {
        background-color: var(--gray-900);
        transform: translateX(-2px);
    }
    .page-header-title {
        font-size: 24px;
        font-weight: 600;
        color: var(--gray-900);
    }
</style>

<div class="page-header">
    <a href="{% url 'admin_bookings' %}" class="back-btn" title="返回预约列表">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
        </svg>
    </a>
    <span class="page-header-title">添加预约</span>
</div>

    <div class="card" style="max-width: 600px; margin: 0 auto;">
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label for="court">场地</label>
                <select id="court" name="court" required>
                    <option value="">请选择场地</option>
                    {% for court in courts %}
                        <option value="{{ court.id }}">{{ court.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="date">预约日期</label>
                <input type="date" id="date" name="date" required>
            </div>
            <div class="form-group">
                <label for="start_time">开始时间</label>
                <input type="time" id="start_time" name="start_time" step="1800" required>
                <small>时间必须是整点或半点</small>
            </div>
            <div class="form-group">
                <label for="end_time">结束时间</label>
                <input type="time" id="end_time" name="end_time" step="1800" required>
                <small>时间必须是整点或半点</small>
            </div>
            <div style="display: flex; gap: 12px; margin-top: 24px;">
                <button type="submit" class="btn btn-success">添加预约</button>
                <a href="{% url 'admin_bookings' %}" class="btn btn-outline">取消</a>
            </div>
        </form>
    </div>
{% endblock %}
